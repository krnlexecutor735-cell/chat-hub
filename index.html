<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Space</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <!-- โหลด Lucide Icons สำหรับดึงไอคอนสวยงามมาใช้งาน -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-pure: #000000;
            --glass-bg: rgba(18, 18, 18, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-focus: rgba(255, 255, 255, 0.2);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-pure);
            background-image: radial-gradient(circle at top, #111115 0%, #000000 100%);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* ล็อคไม่ให้เลื่อนหน้าจอหลัก */
        }

        /* หน้าต่างกรอกชื่อ (Liquid Glass Overlay) */
        #login-screen {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        #login-screen h2 {
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        #login-screen input {
            padding: 14px 18px;
            width: 100%;
            margin-top: 20px;
            margin-bottom: 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background-color: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        #login-screen input:focus {
            border-color: var(--glass-border-focus);
            background-color: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        #login-screen button {
            width: 100%;
            padding: 14px;
            background-color: var(--text-primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #000000;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        #login-screen button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        /* โครงสร้างพื้นที่ทำงานแชทหลัก */
        #app-container {
            display: none;
            width: 100vw;
            height: 100dvh;
            flex-direction: column;
            position: relative;
        }

        /* หัวแชทแบบกระจก */
        .chat-header {
            height: 70px;
            padding: 0 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
        }

        .chat-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* กล่องแสดงผลแชทที่จะมีสกรอลบาร์เลื่อนดูเท่านั้น */
        .messages-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* แถบสกรอลบาร์แบบเรียบง่าย */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* บล็อกแสดงข้อความ */
        .message-bubble {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 14px 18px;
            border-radius: 18px;
            max-width: 80%;
            align-self: flex-start;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .message-bubble.me {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-end;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .message-header {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .message-content {
            word-break: break-word;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message-content a {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-blue);
        }

        .message-content a:hover {
            opacity: 0.8;
        }

        /* สไตล์ชุดเขียนโค้ดและ Markdown */
        .message-content code {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
        }

        .message-content pre {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 14px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid var(--glass-border);
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        /* ปุ่มคัดลอก และ ปุ่มขยายแบบซ่อนในไอคอน */
        .bubble-actions {
            display: flex;
            gap: 8px;
            align-self: flex-end;
            margin-top: 4px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-icon-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /* สไตล์ไฟล์ภาพแนบ */
        .attachment-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 6px;
            border: 1px solid var(--glass-border);
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 6px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
        }

        /* แถบควบคุมกรอกแชทด้านล่าง (Taskbar ล็อคติดขอบล่าง) */
        .chat-input-bar {
            height: auto;
            min-height: 80px;
            padding: 16px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 5;
        }

        .input-wrapper {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 4px 12px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--glass-border-focus);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .input-box {
            flex-grow: 1;
            background: none;
            border: none;
            padding: 10px 6px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            resize: none;
            max-height: 100px;
        }

        .btn-action {
            background: none;
            border: none;
            border-radius: 10px;
            width: 38px;
            height: 38px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-action:hover {
            color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.06);
        }

        .btn-send {
            background-color: var(--text-primary);
            color: #000000;
        }

        .btn-send:hover {
            opacity: 0.9;
        }

        /* หน้าต่างพรีวิวขนาดใหญ่กรณีที่กด "ขยายขนาด" ข้อความ */
        .fullscreen-msg {
            position: fixed !important;
            top: 24px;
            bottom: 24px;
            left: 24px;
            right: 24px;
            width: auto !important;
            height: auto !important;
            max-width: none !important;
            z-index: 1000;
            background-color: rgba(10, 10, 10, 0.95) !important;
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 24px;
            padding: 30px !important;
        }

        .fullscreen-msg .message-content {
            overflow-y: auto;
            max-height: 85%;
        }
    </style>
</head>
<body>

    <!-- หน้าต่างใส่ชื่อ -->
    <div id="login-screen">
        <h2>ระบุชื่อเข้าใช้งาน</h2>
        <p style="font-size: 0.85rem; color: var(--text-secondary);">โปรดกรอกชื่อที่ไม่มีคนอื่นใช้ขณะนี้</p>
        <input type="text" id="username-input" placeholder="กรอกชื่อผู้ใช้..." maxlength="20" onkeypress="handleEnter(event)">
        <button onclick="registerUser()">เข้าร่วม</button>
    </div>

    <!-- โครงสร้างแอปพลิเคชันแชทล็อคหน้าจอ -->
    <div id="app-container">
        <div class="chat-header">
            <div>
                <h3>ช่องแชทส่วนกลาง</h3>
                <span id="active-user-name" style="font-size: 0.75rem; color: var(--text-secondary);"></span>
            </div>
        </div>
        
        <!-- ส่วนนี้เป็นสกรอลล์บาร์ข้อความเท่านั้น -->
        <div class="messages-container" id="chat-messages"></div>

        <!-- Taskbar ด้านล่างล็อคตายตัว -->
        <div class="chat-input-bar">
            <input type="file" id="file-input" style="display: none;" onchange="handleFileSelected(event)">
            
            <button class="btn-action" onclick="document.getElementById('file-input').click()" title="แนบไฟล์">
                <i data-lucide="plus"></i>
            </button>
            
            <div class="input-wrapper">
                <textarea class="input-box" id="message-input" rows="1" placeholder="พิมพ์ข้อความที่นี่... (รองรับ Markdown)" onkeydown="handleChatSubmit(event)"></textarea>
            </div>
            
            <button class="btn-action btn-send" onclick="sendChat()" title="ส่ง">
                <i data-lucide="send"></i>
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        let myUsername = '';
        let selectedFile = null;

        // จัดการเมื่อเปิดหน้ารันระบบไอคอนจากไลบรารี Lucide
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        function handleEnter(e) {
            if (e.key === 'Enter') registerUser();
        }

        function registerUser() {
            const input = document.getElementById('username-input');
            const username = input.value.trim();
            if (!username) return;

            socket.emit('check-username', username, (res) => {
                if (res.success) {
                    myUsername = username;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    document.getElementById('active-user-name').innerText = `@${myUsername}`;
                } else {
                    alert(res.error);
                }
            });
        }

        // ตัวแปลง URL ให้เป็นลิงก์อัตโนมัติ
        function linkify(text) {
            const urlRegex = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
            return text.replace(urlRegex, (url) => {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
            });
        }

        // ประกอบและเรนเดอร์ข้อความแชท
        function renderMessage(data) {
            const isMe = data.sender === myUsername;
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isMe ? 'me' : ''}`;
            bubble.id = `msg-${data.id}`;

            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `<span>${escapeHTML(data.sender)}</span><span>${data.timestamp}</span>`;

            const content = document.createElement('div');
            content.className = 'message-content';

            const hasMarkdown = /[*_#`\[\]\-]/.test(data.text);
            if (hasMarkdown) {
                const cleanHTML = DOMPurify.sanitize(marked.parse(data.text));
                content.innerHTML = cleanHTML;
            } else {
                content.innerHTML = linkify(escapeHTML(data.text));
            }

            // แถบไอคอนคำสั่งใต้ข้อความแชท
            const actions = document.createElement('div');
            actions.className = 'bubble-actions';

            // ไอคอนขยายข้อความแบบเต็มจอ
            const expandBtn = document.createElement('button');
            expandBtn.className = 'action-icon-btn';
            expandBtn.innerHTML = `<i data-lucide="maximize-2" style="width:14px;height:14px;"></i>`;
            expandBtn.title = "ขยายขนาด";
            expandBtn.onclick = () => toggleFullscreen(`msg-${data.id}`);

            // ไอคอนคัดลอกข้อความ
            const copyBtn = document.createElement('button');
            copyBtn.className = 'action-icon-btn';
            copyBtn.innerHTML = `<i data-lucide="copy" style="width:14px;height:14px;"></i>`;
            copyBtn.title = "คัดลอก";
            copyBtn.onclick = () => copyToClipboard(data.text);

            actions.appendChild(expandBtn);
            if (data.text) actions.appendChild(copyBtn);

            bubble.appendChild(header);
            bubble.appendChild(content);
            bubble.appendChild(actions);

            if (data.file) {
                if (data.file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = data.file.data;
                    img.className = 'attachment-preview';
                    bubble.appendChild(img);
                } else {
                    const link = document.createElement('a');
                    link.href = data.file.data;
                    link.download = data.file.name;
                    link.className = 'file-link';
                    link.innerHTML = `<i data-lucide="download" style="width:16px;height:16px;"></i> <span>${data.file.name}</span>`;
                    bubble.appendChild(link);
                }
            }

            return bubble;
        }

        function handleFileSelected(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedFile = {
                    name: file.name,
                    type: file.type,
                    data: e.target.result
                };
            };
            reader.readAsDataURL(file);
        }

        function handleChatSubmit(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChat();
            }
        }

        function sendChat() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text && !selectedFile) return;

            socket.emit('send-message', {
                text: text,
                file: selectedFile
            });

            input.value = '';
            selectedFile = null;
            document.getElementById('file-input').value = '';
        }

        socket.on('chat-history', (history) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            history.forEach(data => {
                container.appendChild(renderMessage(data));
            });
            lucide.createIcons(); // อัปเดตไอคอนที่ถูกเพิ่มใหม่
            scrollToBottom();
        });

        socket.on('new-message', (data) => {
            const container = document.getElementById('chat-messages');
            container.appendChild(renderMessage(data));
            lucide.createIcons();
            scrollToBottom();
        });

        socket.on('user-joined', (username) => {
            showNotification(`${username} เข้าร่วมห้องแชทแล้ว`);
        });

        socket.on('user-left', (username) => {
            showNotification(`${username} ออกจากห้องแชทแล้ว`);
        });

        function toggleFullscreen(elementId) {
            const el = document.getElementById(elementId);
            el.classList.toggle('fullscreen-msg');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('คัดลอกเนื้อหาไปยังคลิปบอร์ดแล้ว');
            });
        }

        function showNotification(text) {
            const container = document.getElementById('chat-messages');
            const notice = document.createElement('div');
            notice.style.cssText = 'align-self: center; background: rgba(255,255,255,0.04); color: var(--text-secondary); font-size: 0.75rem; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--glass-border); margin: 8px 0;';
            notice.innerText = text;
            container.appendChild(notice);
            scrollToBottom();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function scrollToBottom() {
            const el = document.getElementById('chat-messages');
            el.scrollTop = el.scrollHeight;
        }
    </script>
</body>
</html>
